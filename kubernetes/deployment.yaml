apiVersion: apps/v1
kind: Deployment
metadata:
  name: maple-api-router-deployment
  namespace: maple-system
  labels:
    app: maple-api-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maple-api-router
  template:
    metadata:
      labels:
        app: maple-api-router
    spec:
      containers:
        - name: maple-api-router-container
          image: shobhittyagi1011/maple-api-router-service:latest
          ports:
            - containerPort: 8080
